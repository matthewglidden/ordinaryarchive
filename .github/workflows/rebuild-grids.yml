name: Rebuild grids

on:
  schedule:
    - cron: "5 11 * * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Build grids dataset
        run: node scripts/build-grids.mjs --incremental
      - name: Check for suspicious duplications
        id: duplication_check
        run: node scripts/check-suspicious-duplications.mjs
      - name: Commit updated dataset
        run: |
          if git status --porcelain | grep -q "data/grids.json"; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/grids.json
            git commit -m "Update grids dataset"
            git push
          else
            echo "No changes to commit."
          fi
      - name: Upload ingestion debug files
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: grid-ingestion-debug
          path: tmp/grid-debug/*.json
          if-no-files-found: ignore
      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const title = `Ordinary Archive daily grid build failed (${context.runNumber})`;
            const body = [
              `The scheduled grid rebuild failed.`,
              ``,
              `- Run: ${runUrl}`,
              `- Workflow: ${context.workflow}`,
              `- Ref: ${context.ref}`,
              `- SHA: ${context.sha}`,
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
            });
